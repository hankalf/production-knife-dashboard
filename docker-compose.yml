# Full stack for Docker Desktop:  docker compose up --build
#   - db:  PostgreSQL 16 (data persisted in a named volume)
#   - app: the Next.js app; on boot it migrates + seeds, then serves on :3000
#
# For local `npm run dev` against just the database, run:  docker compose up db
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: knife
      POSTGRES_PASSWORD: knife
      POSTGRES_DB: knifedb
    ports:
      - "5432:5432"
    volumes:
      - knife_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knife -d knifedb"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    environment:
      # Point at the db service (not localhost) inside the Docker network.
      DATABASE_URL: "postgresql://knife:knife@db:5432/knifedb?schema=public"
      NODE_ENV: production
    ports:
      # Served on port 80 so the URL needs no ":3000".
      # Reach it at http://localhost or, with a LAN name, http://knives.local
      - "80:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  knife_pgdata:
