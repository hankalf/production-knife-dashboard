# Full stack + Caddy reverse proxy for a clean local hostname with HTTPS.
#   docker compose up --build   →   https://knives.local  (and http:// redirects to it)
#
#   - db:    PostgreSQL 16 (data persisted in a named volume)
#   - app:   the Next.js app; migrates + seeds on boot, serves on :3000 (internal only)
#   - caddy: reverse proxy on ports 80/443, terminates HTTPS with a local CA
#
# Point the hostname (default knives.local — edit ./Caddyfile to change it) at this
# Docker host via mDNS, your router/Pi-hole DNS, or a hosts-file entry. See the README.
#
# For local `npm run dev` against just the database, run:  docker compose up db
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: knife
      POSTGRES_PASSWORD: knife
      POSTGRES_DB: knifedb
    ports:
      - "5432:5432"
    volumes:
      - knife_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knife -d knifedb"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://knife:knife@db:5432/knifedb?schema=public"
      NODE_ENV: production
    # No host port — traffic comes through Caddy on the internal network (app:3000).
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  knife_pgdata:
  caddy_data:
  caddy_config:
